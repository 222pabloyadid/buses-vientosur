<!DOCTYnPE html>
<html>
<head>

  <title>Buses VientoSur</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
<div class="container">
<img src="/logo.png" class="logo">

<h1>🚌 Buses VientoSur</h1>

<h2>Buscar Pasajes</h2>
<label>RUT Estudiante:</label>
<input type="text" id="rut" placeholder="Ingresa tu RUT">
<button onclick="buscarEstudiante()">Buscar Estudiante</button>
<br><br>

<label>Nombre:</label>
<input type="text" id="nombre" placeholder="Tu nombre">

<br><br>

<label>Correo:</label>
<input type="email" id="correo" placeholder="tu@email.com">


<br><br>

<label>Origen:</label>
<select id="origen" onchange="actualizarDestinos()">
  <option>Tolten</option>
  <option>Hualpin</option>
  <option>TeodoroSchmidt</option>
  <option>BarrosArana</option>
  <option>Temuco</option>
</select>

<br><br>

<label>Destino:</label>
<select id="destino">
  <option>Temuco</option>
  <option>Freire</option>
  <option>Pitrufquen</option>
</select>


<br><br>

<label for="fecha">📅 Fecha de viaje:</label>
<input type="date" id="fecha" name="fecha">

<br><br>

<button onclick="buscar()">Buscar Horarios</button>

<h3 id="resultado"></h3>
<button onclick="irAAsientos()">Continuar</button>

<script>
function actualizarDestinos() {
  const origen = document.getElementById("origen").value;
  const destinoSelect = document.getElementById("destino");

  destinoSelect.innerHTML = "";

  if (origen === "Temuco") {
    destinoSelect.innerHTML += "<option>Lolen</option>";
    destinoSelect.innerHTML += "<option>Arauco</option>";
    destinoSelect.innerHTML += "<option>Parada21</option>";
    destinoSelect.innerHTML += "<option>LasDichas</option>";
    destinoSelect.innerHTML += "<option>Limite</option>";
    destinoSelect.innerHTML += "<option>BarrosArana</option>";
    destinoSelect.innerHTML += "<option>Parada31</option>";
    destinoSelect.innerHTML += "<option>TeodoroSchmidt</option>";
    destinoSelect.innerHTML += "<option>Hualpin</option>";
    destinoSelect.innerHTML += "<option>Tolten</option>";
  } else {
    destinoSelect.innerHTML += "<option>Temuco</option>";
    destinoSelect.innerHTML += "<option>Freire</option>";
    destinoSelect.innerHTML += "<option>Pitrufquen</option>";
  }
}
async function buscar() {
  const origen = document.getElementById("origen").value;
  const destino = document.getElementById("destino").value;
  const fecha = document.getElementById("fecha").value;
  
  const hoy = new Date().toLocaleDateString("sv-SE");

  if (fecha < hoy) {
      alert("No puedes comprar pasajes para fechas pasadas");
      return;
  }

  if (!fecha) {
    alert("Selecciona una fecha");
    return;
  }

  let dia = "semana";

  const [year, month, day] = fecha.split("-");
  const fechaObj = new Date(year, month - 1, day);
  const diaSemana = fechaObj.getDay(); // 0=domingo, 6=sábado

  if (diaSemana === 6) dia = "sabado";
  if (diaSemana === 0) dia = "domingo";

  const res = await fetch('/horarios?dia=' + dia + '&origen=' + origen + '&destino=' + destino + '&fecha=' + fecha);
  const data = await res.json();
  // Obtener precio
  const resPrecio = await fetch('/tarifa?origen=' + origen + '&destino=' + destino);
  const dataPrecio = await resPrecio.json();
  window.precioSeleccionado = dataPrecio.precio;

  const contenedor = document.getElementById("resultado");

let html = "";
html += "<h3>Selecciona un horario:</h3>";
html += "<select id='horarioSelect'>";
html += "<option value=''>-- Seleccionar --</option>";

data.horarios.forEach(hora => {
  html += "<option value='" + hora + "'>" + hora + "</option>";
});

html += "</select>";
html += "<p>Precio: $" + dataPrecio.precio + "</p>";

contenedor.innerHTML = html;

document.getElementById("horarioSelect").addEventListener("change", (e) => {
  window.horarioSeleccionado = e.target.value;
});

  
}

async function buscarEstudiante() {
  const rut = document.getElementById("rut").value;

  const res = await fetch(`/estudiante?rut=${rut}`);
  const data = await res.json();

  if (data.ok) {
    const est = data.estudiante;

    document.getElementById("origen").value = est.origen;

    actualizarDestinos();

    document.getElementById("destino").value = est.destino;

    document.getElementById("resultado").innerText =
      "Estudiante: " + est.nombre +
      "\nPrecio especial: $" + est.precio;

  } else {
    alert("Estudiante no encontrado");
  }
}

actualizarDestinos();
function irAAsientos() {
    const fecha = document.getElementById("fecha").value;
    const nombre = document.getElementById("nombre").value;
    const correo = document.getElementById("correo").value;

    if (!nombre) {
        alert("Ingresa tu nombre");
        return;
    }

    if (!correo) {
        alert("Ingresa tu correo");
        return;
    }    


    if (!fecha) {
        alert("Selecciona una fecha");
        return;
    }

    if (!window.horarioSeleccionado) {
        alert("Selecciona un horario");
        return;
    }      

    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    window.location.href = "/asientos.html?origen=" + origen +
    "&destino=" + destino +
    "&fecha=" + fecha +
    "&hora=" + window.horarioSeleccionado +
    "&nombre=" + nombre +
    "&correo=" + correo +
    "&precio=" + window.precioSeleccionado;
}

</script>
</div>

<footer style="text-align:center; font-size:13px; color:#111; margin-top:30px; font-weight:500;">
  © 2026 Buses VientoSur · Creado por Pablo Yañez
</footer>

</body>
</html>
